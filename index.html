<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />

  <!-- 保留缩放限制 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

  <meta name="theme-color" content="#f4f4f4" />

  <title>ASMC4</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23166534'/%3E%3Cpath d='M18 17h28v34H18z' fill='none' stroke='white' stroke-width='4'/%3E%3Cpath d='m24 34 6 6 11-14' fill='none' stroke='white' stroke-width='4'/%3E%3C/svg%3E" />

  <link rel="stylesheet" href="src/css/design-tokens.css" />
  <link rel="stylesheet" href="src/css/base.css" />
  <link rel="stylesheet" href="src/css/components.css" />
  <link rel="stylesheet" href="src/css/responsive.css" />
  <style>
    #bootMask {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: var(--bg, #f4f4f4);
      pointer-events: none;
      transition: opacity 220ms ease;
    }
    #bootMask.is-hidden {
      opacity: 0;
    }
    .skeleton-card {
      aspect-ratio: 1 / 1;
      border-radius: 14px;
      background: linear-gradient(90deg, #e6e7ea 25%, #f0f1f3 50%, #e6e7ea 75%);
      background-size: 200% 100%;
      animation: skeleton-pulse 1.4s ease-in-out infinite;
    }
    @keyframes skeleton-pulse {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    @media (max-width: 360px) {
      .skeleton-card { border-radius: 12px; }
    }
  </style>
</head>

<body style="background:#f4f4f4">
  <div id="bootMask" aria-hidden="true"></div>
  <main class="phone" aria-label="作业管理界面">
    <header class="app-bar">
      <button class="nav-button" id="menuButton" type="button" aria-label="打开作业列表">
        <svg viewBox="0 0 36 36" aria-hidden="true">
          <path d="M5 10.5h26M5 18h26M5 25.5h26" stroke="currentColor" stroke-width="3.2" stroke-linecap="square" />
        </svg>
      </button>

      <span id="barStats" class="bar-stats" aria-hidden="true">0/0</span>

      <section class="title-wrap" id="titleButton" role="button" tabindex="0" aria-label="打开当前作业">
        <div class="title-line">
          <span id="assignmentTitle">作业</span>
          <span class="chevron" aria-hidden="true"></span>
        </div>
      </section>

      <div class="right-actions" aria-label="操作按钮区">
        <button class="icon-button" id="scoringToggle" type="button" aria-label="切换打分模式">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M9 5.5H6.75A1.75 1.75 0 0 0 5 7.25v12A1.75 1.75 0 0 0 6.75 21h10.5A1.75 1.75 0 0 0 19 19.25v-12a1.75 1.75 0 0 0-1.75-1.75H15" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            <path d="M9 5.25A2.25 2.25 0 0 1 11.25 3h1.5A2.25 2.25 0 0 1 15 5.25V7H9V5.25Z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
            <path d="m8.5 14 2.25 2.25 4.75-5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>

        <button class="icon-button" id="addButton" type="button" aria-label="新建作业">
          <svg viewBox="0 0 36 36" aria-hidden="true">
            <path d="M18 7v22M7 18h22" stroke="currentColor" stroke-width="3.2" stroke-linecap="square" />
          </svg>
        </button>
      </div>

      <div class="progress-bar" id="progressBar" role="progressbar"
           aria-valuemin="0" aria-valuemax="100" aria-valuenow="0"
           aria-label="当前作业提交进度"></div>
    </header>

    <div class="scroll-container">
      <section class="grid" id="studentGrid" aria-label="学生列表">
        <div class="skeleton-card"></div><div class="skeleton-card"></div><div class="skeleton-card"></div><div class="skeleton-card"></div><div class="skeleton-card"></div>
        <div class="skeleton-card"></div><div class="skeleton-card"></div><div class="skeleton-card"></div><div class="skeleton-card"></div><div class="skeleton-card"></div>
        <div class="skeleton-card"></div><div class="skeleton-card"></div><div class="skeleton-card"></div><div class="skeleton-card"></div><div class="skeleton-card"></div>
        <div class="skeleton-card"></div><div class="skeleton-card"></div><div class="skeleton-card"></div><div class="skeleton-card"></div><div class="skeleton-card"></div>
        <div class="skeleton-card"></div><div class="skeleton-card"></div><div class="skeleton-card"></div><div class="skeleton-card"></div><div class="skeleton-card"></div>
        <div class="skeleton-card"></div><div class="skeleton-card"></div><div class="skeleton-card"></div><div class="skeleton-card"></div><div class="skeleton-card"></div>
        <div class="skeleton-card"></div><div class="skeleton-card"></div><div class="skeleton-card"></div><div class="skeleton-card"></div><div class="skeleton-card"></div>
        <div class="skeleton-card"></div><div class="skeleton-card"></div><div class="skeleton-card"></div><div class="skeleton-card"></div><div class="skeleton-card"></div>
        <div class="skeleton-card"></div><div class="skeleton-card"></div><div class="skeleton-card"></div><div class="skeleton-card"></div><div class="skeleton-card"></div>
        <div class="skeleton-card"></div><div class="skeleton-card"></div><div class="skeleton-card"></div><div class="skeleton-card"></div><div class="skeleton-card"></div>
      </section>
    </div>

    <aside class="drawer" id="assignmentDrawer" aria-label="作业项目列表" aria-hidden="true">
      <div class="drawer-head">
        <div class="drawer-version" id="drawerVersion"></div>
        <button class="panel-close" id="drawerCloseButton" type="button" aria-label="关闭作业列表">
          <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
            <path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2.2" stroke-linecap="square"/>
          </svg>
        </button>
      </div>

      <div class="drawer-list" id="assignmentList"></div>

      <div class="drawer-actions">
        <div class="drawer-actions-row">
          <button class="drawer-action-btn" id="exportBackupBtn" type="button">导出备份</button>
          <button class="drawer-action-btn" id="importBackupBtn" type="button">导入备份</button>
        </div>
        <button class="drawer-action-btn full" id="settingsBtn" type="button">设置</button>
      </div>
      <input type="file" id="importBackupInput" accept=".json" style="display:none" />
    </aside>

    <section class="top-sheet" id="newAssignmentPanel" aria-label="新建作业" aria-hidden="true">
      <div class="panel-head">
        <div class="panel-title">新建作业</div>
        <button class="panel-close" id="newAssignmentCloseButton" type="button" aria-label="关闭新建作业">
          <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
            <path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2.2" stroke-linecap="square"/>
          </svg>
        </button>
      </div>

      <div class="panel-body">
        <input class="field" id="newAssignmentInput" type="text" placeholder="例如：0620作业" maxlength="24" />
        <select class="field" id="newAssignmentSubjectInput" aria-label="作业科目"></select>

        <div class="dialog-actions">
          <button class="dialog-button" id="newAssignmentCancelButton" type="button">取消</button>
          <button class="dialog-button primary" id="newAssignmentCreateButton" type="button">创建</button>
        </div>
      </div>
      <div class="top-sheet-handle-zone" aria-hidden="true">
        <div class="top-sheet-handle"></div>
      </div>
    </section>

    <section class="top-sheet" id="quickPanel" aria-label="当前作业" aria-hidden="true">
      <div class="panel-head">
        <div class="panel-head-main">
          <div class="panel-title">当前作业</div>
          <div class="quick-current-summary" id="quickCurrentSummary" aria-live="polite">
            <span class="assignment-subject-tag" id="quickCurrentSubject" hidden></span>
            <span class="quick-current-stats" id="quickCurrentStats"></span>
          </div>
        </div>
        <button class="panel-close" id="quickPanelCloseButton" type="button" aria-label="关闭当前作业">
          <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
            <path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2.2" stroke-linecap="square"/>
          </svg>
        </button>
      </div>

      <div class="panel-body">
        <div class="quick-edit-card">
          <input class="quick-edit-name" id="quickRenameInput" type="text" maxlength="24" placeholder="作业名称" aria-label="修改当前作业名称" />
          <select class="subject-select" id="quickSubjectSelect" aria-label="修改当前作业科目"></select>
        </div>

        <div class="quick-settings-card">
          <div class="quick-setting-row">
            <span class="quick-setting-label">显示真实姓名</span>
            <button class="switch" id="quickShowRealNameSwitch" type="button" aria-label="切换是否显示真实姓名">
              <span class="switch-knob"></span>
            </button>
          </div>
          <div class="quick-setting-row">
            <span class="quick-setting-label">打分模式</span>
            <button class="switch" id="quickScoringModeSwitch" type="button" aria-label="切换打分模式">
              <span class="switch-knob"></span>
            </button>
          </div>
        </div>

        <div class="quick-history-row">
          <button class="quick-action-btn" id="undoButton" type="button" title="撤回上一步（Ctrl+Z）" disabled>撤回</button>
          <button class="quick-action-btn" id="redoButton" type="button" title="重做（Ctrl+Y）" disabled>重做</button>
        </div>

        <div class="quick-action-grid">
          <button class="quick-action-btn" id="invertButton" type="button" title="已交与未交状态互相切换">反选提交</button>
          <button class="quick-action-btn danger" id="deleteAssignmentButton" type="button" title="删除当前作业；若只剩一项会自动新建空白作业">删除作业</button>
        </div>
      </div>
      <div class="top-sheet-handle-zone" aria-hidden="true">
        <div class="top-sheet-handle"></div>
      </div>
    </section>

    <div class="confirm-scrim" id="confirmScrim"></div>
    <section class="modal-panel confirm-panel" id="confirmPanel" aria-label="确认操作" aria-hidden="true">
      <div class="panel-head">
        <div class="panel-title" id="confirmTitle">确认操作</div>
      </div>

      <div class="panel-body">
        <p class="confirm-message" id="confirmMessage"></p>

        <div class="dialog-actions">
          <button class="dialog-button" id="confirmCancelButton" type="button">取消</button>
          <button class="dialog-button danger" id="confirmOkButton" type="button">确认</button>
        </div>
      </div>
    </section>

    <section class="fullscreen-panel" id="rosterEditorPanel" aria-label="编辑学生名单" aria-hidden="true">
      <div class="fullscreen-panel-head">
        <div class="panel-title">编辑名单</div>
        <button class="panel-close" id="rosterEditorClose" type="button" aria-label="关闭名单编辑">
          <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
            <path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2.2" stroke-linecap="square"/>
          </svg>
        </button>
      </div>

      <div class="fullscreen-panel-body" id="rosterEditorList"></div>

      <div class="fullscreen-panel-foot">
        <button class="roster-foot-btn danger" id="rosterResetBtn" type="button">重置默认 50 人</button>
        <div class="roster-foot-actions">
          <button class="roster-foot-btn" id="rosterCancelBtn" type="button">取消</button>
          <button class="roster-foot-btn primary" id="rosterSaveBtn" type="button">保存名单</button>
        </div>
      </div>
    </section>

    <section class="fullscreen-panel" id="settingsPanel" aria-label="设置" aria-hidden="true">
      <div class="fullscreen-panel-head">
        <div class="panel-title">设置</div>
        <button class="panel-close" id="settingsCloseButton" type="button" aria-label="关闭设置">
          <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
            <path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2.2" stroke-linecap="square"/>
          </svg>
        </button>
      </div>

      <div class="fullscreen-panel-body" id="settingsBody">
        <div class="settings-section">
          <div class="settings-section-title">显示</div>
          <div class="setting-row">
            <div class="setting-text">
              <p class="setting-title">显示真实姓名</p>
              <p class="setting-desc">关闭后显示天干地支代号。</p>
            </div>
            <button class="switch" id="showRealNameSwitch" type="button" aria-label="切换是否显示真实姓名">
              <span class="switch-knob"></span>
            </button>
          </div>
          <div class="setting-row">
            <div class="setting-text">
              <p class="setting-title">顶栏打分按钮</p>
              <p class="setting-desc">关闭后作业面板仍可切换。</p>
            </div>
            <button class="switch" id="showBarScoringToggleSwitch" type="button" aria-label="切换顶栏是否显示打分按钮">
              <span class="switch-knob"></span>
            </button>
          </div>
          <div class="setting-row">
            <div class="setting-text">
              <p class="setting-title">顶栏已交人数</p>
              <p class="setting-desc">关闭后隐藏已交/总数。</p>
            </div>
            <button class="switch" id="showBarStatsSwitch" type="button" aria-label="切换顶栏是否显示已交人数">
              <span class="switch-knob"></span>
            </button>
          </div>
        </div>

        <div class="settings-section">
          <div class="settings-section-title">打分</div>
          <div class="setting-row">
            <div class="setting-text">
              <p class="setting-title">打分模式</p>
              <p class="setting-desc">开启点按，关闭长按。</p>
            </div>
            <button class="switch" id="scoringModeSwitch" type="button" aria-label="切换打分模式">
              <span class="switch-knob"></span>
            </button>
          </div>
          <div class="setting-row">
            <div class="setting-text">
              <p class="setting-title">×10 模式</p>
              <p class="setting-desc">数字键一次等同十位。</p>
            </div>
            <button class="switch" id="scoreTensModeSwitch" type="button" aria-label="切换×10模式">
              <span class="switch-knob"></span>
            </button>
          </div>
        </div>

        <div class="settings-section native-only">
          <div class="settings-section-title">触感</div>
          <div class="setting-row">
            <div class="setting-text">
              <p class="setting-title">振动反馈</p>
              <p class="setting-desc">开关、键盘、撤销时振动。</p>
            </div>
            <button class="switch" id="hapticsEnabledSwitch" type="button" aria-label="切换振动反馈">
              <span class="switch-knob"></span>
            </button>
          </div>
        </div>

        <div class="settings-section">
          <div class="settings-section-title">数据</div>
          <div class="settings-data-row">
            <button class="drawer-action-btn" id="settingsExportBtn" type="button">导出备份</button>
            <button class="drawer-action-btn" id="settingsImportBtn" type="button">导入备份</button>
          </div>
          <button class="drawer-action-btn full" id="settingsRosterBtn" type="button">编辑名单</button>
        </div>
      </div>
    </section>

    <section class="score-sheet" id="scoreSheet" aria-label="打分面板" aria-hidden="true">
      <div class="score-sheet-handle" aria-hidden="true"></div>
      <div class="score-sheet-body">
        <div class="score-student-info">
          <span class="score-student-serial" id="scoreStudentSerial">--</span>
          <span class="score-student-name" id="scoreStudentName">--</span>
        </div>

        <div class="score-display-row">
          <div class="score-display" id="scoreDisplay">
            <span class="score-display-value" id="scoreDisplayValue">0</span>
            <button class="score-display-backspace" id="scoreBackspaceBtn" type="button" aria-label="删除上一位数字" title="删除上一位数字">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M21 5.5H8.2L3.5 12l4.7 6.5H21V5.5z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                <path d="M10.5 9.25l5.5 5.5M16 9.25l-5.5 5.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="score-numpad">
          <button class="numpad-btn" data-value="1" type="button">1</button>
          <button class="numpad-btn" data-value="2" type="button">2</button>
          <button class="numpad-btn" data-value="3" type="button">3</button>
          <button class="numpad-btn" data-value="4" type="button">4</button>
          <button class="numpad-btn" data-value="5" type="button">5</button>
          <button class="numpad-btn" data-value="6" type="button">6</button>
          <button class="numpad-btn" data-value="7" type="button">7</button>
          <button class="numpad-btn" data-value="8" type="button">8</button>
          <button class="numpad-btn" data-value="9" type="button">9</button>
          <button class="numpad-btn numpad-btn-function score-tens-btn" id="scoreTensBtn" data-action="tens" type="button">×10</button>
          <button class="numpad-btn" data-value="0" type="button">0</button>
          <button class="numpad-btn numpad-btn-function" data-action="decimal" type="button" aria-label="小数点" title="小数点">.</button>
        </div>

        <div class="score-note-wrap">
          <input class="field score-note-input" id="scoreNoteInput" type="text" placeholder="点击输入备注" maxlength="20" />
          <button class="score-note-clear" id="scoreNoteClear" type="button" aria-label="清除备注" tabindex="-1">
            <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true">
              <path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2.2" stroke-linecap="square"/>
            </svg>
          </button>
        </div>

        <div class="score-actions">
          <button class="dialog-button" id="scoreCancel" type="button">取消</button>
          <button class="score-action-btn score-action-primary" id="scoreConfirm" type="button">确认</button>
        </div>
      </div>
    </section>

    <div class="app-toast" id="appToast" hidden aria-live="polite">
      <span class="app-toast-message" id="appToastMessage"></span>
      <button class="app-toast-action" id="appToastAction" type="button" hidden></button>
    </div>
    <div class="sr-only" id="liveStatus" aria-live="polite"></div>
  </main>

  <script type="module" src="src/js/app.js"></script>
</body>
</html>
