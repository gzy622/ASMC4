<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />

  <!-- 保留缩放限制 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

  <meta name="theme-color" content="#f4f4f4" />

  <title>0619作业 UI</title>

  <link rel="stylesheet" href="src/css/design-tokens.css" />
  <link rel="stylesheet" href="src/css/base.css" />
  <link rel="stylesheet" href="src/css/components.css" />
  <link rel="stylesheet" href="src/css/responsive.css" />
</head>

<body>
  <main class="phone" aria-label="作业管理界面">
    <header class="app-bar">
      <button class="nav-button" id="menuButton" type="button" aria-label="打开作业列表">
        <svg viewBox="0 0 36 36" aria-hidden="true">
          <path d="M5 10.5h26M5 18h26M5 25.5h26" stroke="currentColor" stroke-width="3.2" stroke-linecap="square" />
        </svg>
      </button>

      <section class="title-wrap" id="titleButton" role="button" tabindex="0" aria-label="打开快捷面板">
        <div class="title-line">
          <span id="assignmentTitle">0619作业</span>
          <span class="chevron" aria-hidden="true"></span>
        </div>
      </section>

      <div class="right-actions" aria-label="操作按钮区">
        <button class="icon-button" id="settingsButton" type="button" aria-label="切换打分模式">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M9 5.5H6.75A1.75 1.75 0 0 0 5 7.25v12A1.75 1.75 0 0 0 6.75 21h10.5A1.75 1.75 0 0 0 19 19.25v-12a1.75 1.75 0 0 0-1.75-1.75H15" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            <path d="M9 5.25A2.25 2.25 0 0 1 11.25 3h1.5A2.25 2.25 0 0 1 15 5.25V7H9V5.25Z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
            <path d="m8.5 14 2.25 2.25 4.75-5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>

        <button class="icon-button" id="addButton" type="button" aria-label="新建作业">
          <svg viewBox="0 0 36 36" aria-hidden="true">
            <path d="M18 7v22M7 18h22" stroke="currentColor" stroke-width="3.2" stroke-linecap="square" />
          </svg>
        </button>
      </div>

      <div class="progress-bar" id="progressBar" role="progressbar"
           aria-valuemin="0" aria-valuemax="100" aria-valuenow="0"
           aria-label="当前作业提交进度"></div>
    </header>

    <div class="scroll-container">
      <section class="grid" id="studentGrid" aria-label="学生列表"></section>
    </div>

    <div class="drawer-scrim" id="drawerScrim" aria-hidden="true"></div>

    <aside class="drawer" id="assignmentDrawer" aria-label="作业项目列表" aria-hidden="true">
      <div class="drawer-head">
        <div class="drawer-title">AssignmentCheck</div>
        <button class="panel-close" id="drawerCloseButton" type="button" aria-label="关闭作业列表">
          <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
            <path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2.2" stroke-linecap="square"/>
          </svg>
        </button>
      </div>

      <div class="drawer-list" id="assignmentList"></div>

      <div class="drawer-actions">
        <button class="drawer-action-btn" id="exportBackupBtn" type="button">导出备份</button>
        <button class="drawer-action-btn" id="importBackupBtn" type="button">导入备份</button>

      </div>
      <input type="file" id="importBackupInput" accept=".json" style="display:none" />
    </aside>

    <div class="modal-scrim" id="modalScrim" aria-hidden="true"></div>

    <section class="center-panel" id="newAssignmentPanel" aria-label="新建作业" aria-hidden="true">
      <div class="panel-head">
        <div class="panel-title">新建作业</div>
        <button class="panel-close" id="newAssignmentCloseButton" type="button" aria-label="关闭新建作业">
          <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
            <path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2.2" stroke-linecap="square"/>
          </svg>
        </button>
      </div>

      <div class="panel-body">
        <input class="field" id="newAssignmentInput" type="text" placeholder="例如：0620作业" maxlength="24" />

        <div class="dialog-actions">
          <button class="dialog-button" id="newAssignmentCancelButton" type="button">取消</button>
          <button class="dialog-button primary" id="newAssignmentCreateButton" type="button">创建</button>
        </div>
      </div>
    </section>

    <section class="center-panel" id="quickPanel" aria-label="快捷面板" aria-hidden="true">
      <div class="panel-head">
        <div class="panel-title">快捷面板</div>
        <button class="panel-close" id="quickPanelCloseButton" type="button" aria-label="关闭快捷面板">
          <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
            <path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2.2" stroke-linecap="square"/>
          </svg>
        </button>
      </div>

      <div class="panel-body">
        <div class="quick-assignment-selector" id="quickAssignmentList"></div>

        <div class="panel-body-divider" aria-hidden="true"></div>

        <div class="setting-row">
          <div class="setting-text">
            <p class="setting-title">显示真实姓名</p>
            <p class="setting-desc">关闭后使用甲子、乙丑等天干地支代号显示。</p>
          </div>
          <button class="switch" id="hideNameSwitch" type="button" aria-label="切换是否显示真实姓名">
            <span class="switch-knob"></span>
          </button>
        </div>

        <button class="setting-action" id="invertButton" type="button">
          <strong>反选提交状态</strong>
          <span>当前作业中，已交与未交状态互相切换。</span>
        </button>

        <button class="setting-action danger" id="deleteAssignmentButton" type="button">
          <strong>删除当前作业</strong>
          <span>删除后会切换到相邻作业；若只剩一项，会自动新建空白作业。</span>
        </button>
      </div>
    </section>

    <section class="center-panel confirm-panel" id="confirmPanel" aria-label="确认操作" aria-hidden="true">
      <div class="panel-head">
        <div class="panel-title" id="confirmTitle">确认操作</div>
      </div>

      <div class="panel-body">
        <p class="confirm-message" id="confirmMessage"></p>

        <div class="dialog-actions">
          <button class="dialog-button" id="confirmCancelButton" type="button">取消</button>
          <button class="dialog-button danger" id="confirmOkButton" type="button">确认</button>
        </div>
      </div>
    </section>

    <div class="score-sheet-scrim" id="scoreSheetScrim" aria-hidden="true"></div>

    <section class="score-sheet" id="scoreSheet" aria-label="打分面板" aria-hidden="true">
      <div class="score-sheet-handle" aria-hidden="true"></div>
      <div class="score-sheet-body">
        <div class="score-student-info">
          <span class="score-student-serial" id="scoreStudentSerial">--</span>
          <span class="score-student-name" id="scoreStudentName">--</span>
        </div>

        <div class="score-display-row">
          <div class="score-display" id="scoreDisplay">0</div>
        </div>

        <div class="score-numpad">
          <button class="numpad-btn" data-value="1" type="button">1</button>
          <button class="numpad-btn" data-value="2" type="button">2</button>
          <button class="numpad-btn" data-value="3" type="button">3</button>
          <button class="numpad-btn" data-value="4" type="button">4</button>
          <button class="numpad-btn" data-value="5" type="button">5</button>
          <button class="numpad-btn" data-value="6" type="button">6</button>
          <button class="numpad-btn" data-value="7" type="button">7</button>
          <button class="numpad-btn" data-value="8" type="button">8</button>
          <button class="numpad-btn" data-value="9" type="button">9</button>
          <button class="numpad-btn numpad-btn-function score-tens-btn" id="scoreTensBtn" data-action="tens" type="button">×10</button>
          <button class="numpad-btn" data-value="0" type="button">0</button>
          <button class="numpad-btn numpad-btn-function numpad-btn-backspace" data-action="backspace" type="button" aria-label="删除上一位数字" title="删除上一位数字">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M21 5.5H8.2L3.5 12l4.7 6.5H21V5.5z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
              <path d="M10.5 9.25l5.5 5.5M16 9.25l-5.5 5.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </button>
        </div>

        <div class="score-note-wrap">
          <input class="field score-note-input" id="scoreNoteInput" type="text" placeholder="点击输入备注" maxlength="20" />
          <button class="score-note-clear" id="scoreNoteClear" type="button" aria-label="清除备注" tabindex="-1">
            <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true">
              <path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2.2" stroke-linecap="square"/>
            </svg>
          </button>
        </div>

        <div class="score-actions">
          <button class="score-action-btn" id="scoreCancel" type="button">取消</button>
          <button class="score-action-btn score-action-primary" id="scoreConfirm" type="button">确认</button>
        </div>
      </div>
    </section>

    <div class="sr-only" id="liveStatus" aria-live="polite"></div>
  </main>

  <script type="module" src="src/js/app.js"></script>
</body>
</html>
